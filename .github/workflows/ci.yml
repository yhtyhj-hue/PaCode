name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Gate tests
        run: npm test

      - name: Coverage thresholds
        run: npm run test:coverage

      - name: Gate evals
        run: npm run eval:gate

      - name: Lint
        run: npm run lint
